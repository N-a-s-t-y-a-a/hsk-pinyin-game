<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HSK Pinyin — тёмная тема | уникальные уровни 1-100</title>
    <style>
        /* все стили как в предыдущей версии — не меняем, они уже адаптивные и тёмные */
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', 'Noto Sans CJK SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app-container {
            width: 1300px;
            max-width: 100%;
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(72, 187, 120, 0.2);
            overflow: hidden;
        }
        .tabs {
            display: flex;
            background: #0f1422;
            gap: 4px;
            padding: 12px 16px 0 16px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #1e2a3a;
            border: none;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: bold;
            color: #a0b8d0;
            border-radius: 28px 28px 0 0;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #0f172a;
            color: #6ee7b7;
            box-shadow: 0 -2px 0 #6ee7b7;
        }
        .tab-content {
            display: none;
            padding: 20px;
            background: #0f172a;
            min-height: 600px;
        }
        .tab-content.active { display: block; }
        .auth-panel {
            max-width: 450px;
            margin: 30px auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 48px;
            border: 1px solid #334155;
        }
        .auth-panel h2 { color: #e2e8f0; text-align: center; }
        .auth-panel input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: 2px solid #334155;
            border-radius: 60px;
            font-size: 1rem;
            background: #0f172a;
            color: #f1f5f9;
        }
        .btn {
            background: #2dd4bf;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin: 5px;
        }
        .btn:hover { background: #14b8a6; transform: scale(0.97);}
        .btn-danger { background: #f87171; color: #1e1e2a; }
        .btn-warning { background: #fbbf24; color: #1e1e2a; }
        .game-area {
            background: #0f172a;
            border-radius: 48px;
            padding: 16px;
        }
        .sentence-row {
            background: #1e293b;
            padding: 20px;
            border-radius: 40px;
            font-size: 1.4rem;
            line-height: 1.4;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 24px;
            border: 1px solid #334155;
            color: #e2e8f0;
            word-break: break-word;
        }
        .mahjong-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            padding: 16px;
            background: #0a0f1e;
            border-radius: 48px;
            min-height: 280px;
        }
        .tile {
            background: #1e293b;
            width: 90px;
            height: 110px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            font-weight: bold;
            box-shadow: 0 8px 0 #0f172a;
            cursor: pointer;
            border: 1px solid #2dd4bf;
            color: #f1f5f9;
            transition: 0.05s linear;
        }
        .tile.removed { visibility: hidden; pointer-events: none; }
        .mahjong-grid.stack-mode {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            background: #0a0f1e;
            min-height: 400px;
        }
        .stack-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .stack-tile {
            position: relative;
            width: 85px;
            height: 105px;
            background: #1e293b;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            border: 1px solid #2dd4bf;
            margin-bottom: -65px;
            transition: 0.1s;
            color: #f1f5f9;
        }
        .stack-tile:last-child { margin-bottom: 0; }
        .stack-tile.blocked {
            background: #2d3a4e;
            filter: grayscale(0.5);
            border-color: #4a5a72;
            color: #94a3b8;
            cursor: not-allowed;
        }
        .stack-tile:not(.blocked) {
            background: #2dd4bf20;
            border: 2px solid #2dd4bf;
            box-shadow: 0 0 12px rgba(45,212,191,0.3);
            cursor: pointer;
            z-index: 10;
        }
        .stack-tile.removed { display: none; }
        .info-panel {
            background: #1e293b;
            border-radius: 40px;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            color: #cbd5e1;
        }
        .timer {
            font-size: 1.6rem;
            font-family: monospace;
            background: #0f172a;
            padding: 4px 16px;
            border-radius: 60px;
            color: #6ee7b7;
        }
        .modal, .pause-overlay, .choice-dialog {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(10, 15, 30, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content, .pause-card, .choice-card {
            background: #1e293b;
            padding: 30px;
            border-radius: 48px;
            text-align: center;
            min-width: 280px;
            border: 1px solid #2dd4bf;
            color: #e2e8f0;
        }
        .modal-content input {
            font-size: 1.4rem;
            padding: 12px;
            margin: 16px 0;
            width: 90%;
            border-radius: 60px;
            border: 2px solid #2dd4bf;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        .hidden { display: none; }
        .level-card {
            background: #1e293b;
            border-radius: 40px;
            padding: 20px;
            width: 180px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #334155;
            transition: 0.2s;
            color: #e2e8f0;
        }
        .level-card:hover { border-color: #2dd4bf; transform: translateY(-4px);}
        .submenu {
            background: #0f172a;
            border-radius: 40px;
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        .game-list-item {
            background: #1e293b;
            margin: 8px;
            padding: 12px;
            border-radius: 32px;
            display: flex;
            justify-content: space-between;
            color: #cbd5e1;
        }
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            background: #0f172a;
            padding: 12px;
            border-radius: 60px;
            color: #e2e8f0;
        }
        @media (max-width: 700px) {
            body { padding: 8px; }
            .app-container { border-radius: 32px; }
            .tabs { padding: 8px 8px 0 8px; }
            .tab-btn { padding: 8px 12px; font-size: 0.8rem; }
            .tab-content { padding: 12px; }
            .sentence-row { font-size: 1.1rem; padding: 12px; letter-spacing: 1px; }
            .tile { width: 70px; height: 90px; font-size: 1.8rem; }
            .stack-tile { width: 65px; height: 85px; font-size: 1.6rem; margin-bottom: -50px; }
            .mahjong-grid.stack-mode { gap: 15px; }
            .info-panel { flex-direction: column; align-items: stretch; text-align: center; }
            .timer { font-size: 1.3rem; text-align: center; }
            .btn, .btn-small { padding: 6px 12px; font-size: 0.8rem; }
            .modal-content { padding: 20px; min-width: 260px; }
            .modal-content input { font-size: 1.2rem; }
            .level-card { width: 140px; padding: 12px; }
        }
        @media (max-width: 480px) {
            .stack-tile { width: 55px; height: 75px; font-size: 1.3rem; margin-bottom: -40px; }
            .tile { width: 60px; height: 80px; font-size: 1.5rem; }
            .sentence-row { font-size: 0.95rem; }
        }
        .btn-small {
            background: #2dd4bf;
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            color: #0f172a;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="tabs">
        <button class="tab-btn active" data-tab="auth">🔐 Вход</button>
        <button class="tab-btn" data-tab="menu">🎮 Меню</button>
        <button class="tab-btn" data-tab="game">✍️ Игра</button>
        <button class="tab-btn" data-tab="progress">📊 Прогресс</button>
    </div>

    <div id="tab-auth" class="tab-content active">
        <div class="auth-panel">
            <h2>Пиньинь-тренажёр HSK</h2>
            <input type="text" id="loginInput" placeholder="Логин">
            <input type="password" id="passInput" placeholder="Пароль (мин 3)">
            <button class="btn" id="registerBtn">Регистрация</button>
            <button class="btn" id="loginBtn">Вход</button>
            <button class="btn btn-warning" id="guestBtn">Гость</button>
            <p id="authMsg" style="color:#f1f5f9;"></p>
        </div>
    </div>

    <div id="tab-menu" class="tab-content">
        <h2 style="color:#e2e8f0;">Выберите уровень HSK</h2>
        <div id="levelSelector" style="display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;"></div>
        <div id="levelDetailPanel" class="submenu hidden"></div>
    </div>

    <div id="tab-game" class="tab-content">
        <div class="info-panel">
            <div>❤️ Жизни: <span id="livesCount">5</span></div>
            <div class="timer">⏱️ <span id="timerDisplay">0.0</span> сек</div>
            <button class="btn" id="pauseBtn">⏸ Пауза</button>
            <div>💡 Подсказки: <span id="hintsLeft">3</span> <button id="shuffleBtn" class="btn-small">🃏 Перемешать</button></div>
        </div>
        <div class="game-area">
            <div class="sentence-row" id="sentenceText">Загрузка...</div>
            <div class="mahjong-grid" id="mahjongGrid"></div>
        </div>
    </div>

    <div id="tab-progress" class="tab-content">
        <h2 style="color:#e2e8f0;">🏆 Статистика</h2>
        <div id="progressList"></div>
    </div>
</div>

<div id="pauseModal" class="pause-overlay hidden">
    <div class="pause-card"><h2>⏸ ПАУЗА</h2><button class="btn" id="resumeBtn">Продолжить</button><button class="btn btn-danger" id="quitGameBtn">Выйти</button></div>
</div>

<script>
    // ---------- ГЕНЕРАЦИЯ 100 УНИКАЛЬНЫХ УРОВНЕЙ ДЛЯ HSK 1,2,3 ----------
    // Базовые слова для HSK1 (реальные)
    const hsk1Words = [
        {char:"你", pinyin:"ni"}, {char:"好", pinyin:"hao"}, {char:"吗", pinyin:"ma"}, {char:"我", pinyin:"wo"},
        {char:"爱", pinyin:"ai"}, {char:"中", pinyin:"zhong"}, {char:"国", pinyin:"guo"}, {char:"他", pinyin:"ta"},
        {char:"是", pinyin:"shi"}, {char:"老", pinyin:"lao"}, {char:"师", pinyin:"shi"}, {char:"吃", pinyin:"chi"},
        {char:"饭", pinyin:"fan"}, {char:"喝", pinyin:"he"}, {char:"水", pinyin:"shui"}, {char:"北", pinyin:"bei"},
        {char:"京", pinyin:"jing"}, {char:"很", pinyin:"hen"}, {char:"大", pinyin:"da"}, {char:"明", pinyin:"ming"},
        {char:"天", pinyin:"tian"}, {char:"见", pinyin:"jian"}, {char:"对", pinyin:"dui"}, {char:"不", pinyin:"bu"},
        {char:"起", pinyin:"qi"}, {char:"谢", pinyin:"xie"}, {char:"名", pinyin:"ming"}, {char:"字", pinyin:"zi"},
        {char:"什", pinyin:"shen"}, {char:"么", pinyin:"me"}, {char:"学", pinyin:"xue"}, {char:"生", pinyin:"sheng"},
        {char:"妈", pinyin:"ma"}, {char:"爸", pinyin:"ba"}, {char:"儿", pinyin:"er"}, {char:"女", pinyin:"nü"},
        {char:"朋", pinyin:"peng"}, {char:"友", pinyin:"you"}, {char:"今", pinyin:"jin"}, {char:"昨", pinyin:"zuo"},
        {char:"现", pinyin:"xian"}, {char:"在", pinyin:"zai"}, {char:"点", pinyin:"dian"}, {char:"工", pinyin:"gong"},
        {char:"作", pinyin:"zuo"}, {char:"店", pinyin:"dian"}, {char:"商", pinyin:"shang"}, {char:"门", pinyin:"men"}
    ];
    // генерируем 100 фраз для HSK1 комбинированием слов
    function generateHSK1Levels() {
        let levels = [];
        for(let i=0; i<100; i++) {
            // разные паттерны
            let pattern = i % 10;
            let w = (idx) => hsk1Words[(i*3 + idx) % hsk1Words.length];
            let text = "";
            let tiles = [];
            if(pattern < 3) {
                text = w(0).char + w(1).char + w(2).char + "吗";
                tiles = [w(0), w(1), w(2), {char:"吗", pinyin:"ma"}];
            } else if(pattern < 6) {
                text = w(0).char + w(1).char + w(2).char + w(3).char;
                tiles = [w(0), w(1), w(2), w(3)];
            } else if(pattern < 8) {
                text = w(0).char + w(1).char + "是" + w(2).char + w(3).char;
                tiles = [w(0), w(1), {char:"是", pinyin:"shi"}, w(2), w(3)];
            } else {
                text = w(0).char + w(1).char + "很" + w(2).char;
                tiles = [w(0), w(1), {char:"很", pinyin:"hen"}, w(2)];
            }
            levels.push({ text, tiles });
        }
        return levels;
    }
    // HSK2 - более длинные фразы, используем комбинации
    const hsk2Words = [
        {char:"机",pinyin:"ji"},{char:"场",pinyin:"chang"},{char:"坐",pinyin:"zuo"},{char:"飞",pinyin:"fei"},
        {char:"快",pinyin:"kuai"},{char:"考",pinyin:"kao"},{char:"试",pinyin:"shi"},{char:"复",pinyin:"fu"},
        {char:"习",pinyin:"xi"},{char:"累",pinyin:"lei"},{char:"但",pinyin:"dan"},{char:"要",pinyin:"yao"},
        {char:"努",pinyin:"nu"},{char:"力",pinyin:"li"},{char:"商",pinyin:"shang"},{char:"店",pinyin:"dian"},
        {char:"开",pinyin:"kai"},{char:"门",pinyin:"men"},{char:"了",pinyin:"le"},{char:"们",pinyin:"men"},
        {char:"进",pinyin:"jin"},{char:"去",pinyin:"qu"},{char:"买",pinyin:"mai"},{char:"东",pinyin:"dong"},
        {char:"西",pinyin:"xi"},{char:"公",pinyin:"gong"},{char:"园",pinyin:"yuan"},{char:"散",pinyin:"san"},
        {char:"步",pinyin:"bu"},{char:"跑",pinyin:"pao"},{char:"路",pinyin:"lu"},{char:"车",pinyin:"che"}
    ];
    function generateHSK2Levels() {
        let levels = [];
        for(let i=0; i<100; i++) {
            let w = (idx) => hsk2Words[(i*2 + idx) % hsk2Words.length];
            let pattern = i % 5;
            let text = "";
            let tiles = [];
            if(pattern === 0) text = w(0).char + w(1).char + w(2).char + w(3).char + "很" + w(4).char;
            else if(pattern === 1) text = w(0).char + w(1).char + "很" + w(2).char + "，" + w(3).char + w(4).char;
            else if(pattern === 2) text = w(0).char + w(1).char + w(2).char + "了，" + w(3).char + w(4).char + w(5).char;
            else if(pattern === 3) text = w(0).char + w(1).char + w(2).char + w(3).char + w(4).char + w(5).char;
            else text = w(0).char + w(1).char + "，" + w(2).char + w(3).char + w(4).char;
            let tileCount = Math.min(text.length, 8);
            tiles = [];
            for(let t=0; t<tileCount; t++) {
                let found = hsk2Words.find(x=>x.char === text[t]);
                if(found) tiles.push(found);
                else tiles.push({char:text[t], pinyin:"?"});
            }
            levels.push({ text, tiles });
        }
        return levels;
    }
    // HSK3 - сложные предложения (генерируем)
    const hsk3Words = [
        {char:"虽",pinyin:"sui"},{char:"然",pinyin:"ran"},{char:"冷",pinyin:"leng"},{char:"还",pinyin:"hai"},
        {char:"想",pinyin:"xiang"},{char:"外",pinyin:"wai"},{char:"面",pinyin:"mian"},{char:"这",pinyin:"zhe"},
        {char:"个",pinyin:"ge"},{char:"问",pinyin:"wen"},{char:"题",pinyin:"ti"},{char:"特",pinyin:"te"},
        {char:"别",pinyin:"bie"},{char:"简",pinyin:"jian"},{char:"单",pinyin:"dan"},{char:"只",pinyin:"zhi"},
        {char:"认",pinyin:"ren"},{char:"真",pinyin:"zhen"},{char:"思",pinyin:"si"},{char:"能",pinyin:"neng"},
        {char:"找",pinyin:"zhao"},{char:"到",pinyin:"dao"},{char:"答",pinyin:"da"},{char:"案",pinyin:"an"},
        {char:"因",pinyin:"yin"},{char:"为",pinyin:"wei"},{char:"所",pinyin:"suo"},{char:"以",pinyin:"yi"}
    ];
    function generateHSK3Levels() {
        let levels = [];
        for(let i=0; i<100; i++) {
            let w = (idx) => hsk3Words[(i*3 + idx) % hsk3Words.length];
            let pattern = i % 4;
            let text = "";
            if(pattern === 0) text = w(0).char + w(1).char + w(2).char + w(3).char + "，" + w(4).char + w(5).char + w(6).char;
            else if(pattern === 1) text = w(0).char + w(1).char + w(2).char + w(3).char + w(4).char + w(5).char + w(6).char + w(7).char;
            else if(pattern === 2) text = w(0).char + w(1).char + w(2).char + "，" + w(3).char + w(4).char + w(5).char + w(6).char;
            else text = w(0).char + w(1).char + w(2).char + w(3).char + w(4).char + w(5).char + "。" + w(6).char + w(7).char;
            let tiles = [];
            for(let t=0; t<text.length; t++) {
                let found = hsk3Words.find(x=>x.char === text[t]);
                if(found) tiles.push(found);
                else tiles.push({char:text[t], pinyin:"?"});
            }
            levels.push({ text, tiles });
        }
        return levels;
    }

    const HSK1_LEVELS = generateHSK1Levels();
    const HSK2_LEVELS = generateHSK2Levels();
    const HSK3_LEVELS = generateHSK3Levels();

    function generateSubLevels(baseArray, total = 100) {
        // baseArray уже содержит 100 уникальных элементов, просто возвращаем копии
        return baseArray.map(lvl => ({ text: lvl.text, tiles: lvl.tiles.map(t=>({...t})) }));
    }
    
    const levelPools = {
        easy: { name: "HSK 1", subLevels: generateSubLevels(HSK1_LEVELS, 100), optimalTime: 30 },
        medium: { name: "HSK 2", subLevels: generateSubLevels(HSK2_LEVELS, 100), optimalTime: 50 },
        hard: { name: "HSK 3", subLevels: generateSubLevels(HSK3_LEVELS, 100), optimalTime: 70 }
    };
    
    // ----- ПОЛЬЗОВАТЕЛИ (без изменений) -----
    let users = [], currentUser = null, currentGame = null, isPaused = false;
    function loadUsers() { let d = localStorage.getItem("pinyin_users"); users = d ? JSON.parse(d) : []; }
    function saveUsers() { localStorage.setItem("pinyin_users", JSON.stringify(users)); }
    function saveCurrentUser() { if(currentUser && !currentUser.isGuest) localStorage.setItem("pinyin_current", JSON.stringify({login: currentUser.login})); else localStorage.removeItem("pinyin_current"); }
    function loadCurrentUser() { let raw = localStorage.getItem("pinyin_current"); if(raw) { let {login}=JSON.parse(raw); let found=users.find(u=>u.login===login); if(found) { currentUser=found; currentUser.isGuest=false; return true; } } currentUser=null; return false; }
    function initProgress() { return { easy:{completed:[],bestTimes:{},lastUnlocked:1}, medium:{completed:[],bestTimes:{},lastUnlocked:1}, hard:{completed:[],bestTimes:{},lastUnlocked:1} }; }
    function createUser(login,pass,isGuest=false) { return { login, password:pass, isGuest, progress: initProgress() }; }
    
    // ----- ИГРОВАЯ ЛОГИКА (та же, что в прошлый раз, только без дублей) -----
    let selectedTileId = null, currentModal = null, currentTileMode = "flat";
    function shuffleArray(arr) { for(let i=arr.length-1;i>0;i--) { let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
    function normalizePinyin(s) { return s.toLowerCase().replace(/[^a-z]/g,''); }
    function buildStacks(tiles) {
        let stacks = [], remaining = tiles.filter(t=>!t.removed);
        for(let i=0;i<remaining.length;i+=4) stacks.push(remaining.slice(i,i+4));
        return stacks;
    }
    function renderTiles(tiles) {
        let container = document.getElementById('mahjongGrid');
        container.innerHTML = '';
        if(currentTileMode === "flat") {
            container.classList.remove('stack-mode');
            tiles.forEach((tile, idx) => {
                if(tile.removed) return;
                let div = document.createElement('div');
                div.className = 'tile';
                div.innerText = tile.char;
                div.onclick = () => { if(currentGame?.isActive) { selectedTileId=idx; showPinyinModal(tile.char, tile.pinyin); } };
                container.appendChild(div);
            });
        } else {
            container.classList.add('stack-mode');
            let stacks = buildStacks(tiles);
            for(let col=0; col<stacks.length; col++) {
                let stack = stacks[col];
                let colDiv = document.createElement('div');
                colDiv.className = 'stack-col';
                for(let row=0; row<stack.length; row++) {
                    let tile = stack[row];
                    let div = document.createElement('div');
                    div.className = 'stack-tile';
                    div.innerText = tile.char;
                    let isTop = (row === stack.length-1);
                    if(!isTop) div.classList.add('blocked');
                    div.onclick = (function(c,r,t) { return function() {
                        if(!currentGame?.isActive) return;
                        let curStacks = buildStacks(currentGame.currentTiles);
                        if(!curStacks[c] || r !== curStacks[c].length-1 || t.removed) { alert("🔒 Закрыто!"); return; }
                        selectedTileId = {col:c, row:r, tile:t};
                        showPinyinModal(t.char, t.pinyin);
                    }; })(col, row, tile);
                    colDiv.appendChild(div);
                }
                container.appendChild(colDiv);
            }
        }
    }
    function removeTileFromStacks(tileId) {
        if(currentTileMode === "flat") currentGame.currentTiles[tileId].removed = true;
        else {
            let {col,row,tile}=tileId;
            let original = currentGame.currentTiles.find(t=>t.char===tile.char && !t.removed);
            if(original) original.removed = true;
        }
        currentGame.tilesRemaining--;
    }
    function showPinyinModal(char, correctPinyin) {
        if(currentModal) return;
        let correct = normalizePinyin(correctPinyin);
        let modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `<div class="modal-content"><h3>Иероглиф: ${char}</h3><input id="pinyinInput" placeholder="пиньинь без тонов" autocomplete="off"><div><button class="btn" id="modalSubmitBtn">✅ Проверить</button><button class="btn btn-warning" id="modalHintBtn">💡 Подсказка (${currentGame.hints})</button><button class="btn btn-danger" id="modalCancelBtn">Отмена</button></div></div>`;
        document.body.appendChild(modalDiv);
        currentModal = modalDiv;
        let input = modalDiv.querySelector('#pinyinInput');
        input.focus();
        let submit = () => {
            let ans = normalizePinyin(input.value);
            if(ans === correct) {
                removeTileFromStacks(selectedTileId);
                document.getElementById('livesCount').innerText = currentGame.lives;
                renderTiles(currentGame.currentTiles);
                if(currentGame.tilesRemaining === 0) levelComplete();
                closeModal();
            } else {
                currentGame.lives--;
                document.getElementById('livesCount').innerText = currentGame.lives;
                if(currentGame.lives <= 0) { closeModal(); gameOver(); }
                else { alert(`❌ Неверно! Правильно: ${correct}. Осталось жизней: ${currentGame.lives}`); closeModal(); }
            }
        };
        modalDiv.querySelector('#modalSubmitBtn').onclick = submit;
        modalDiv.querySelector('#modalHintBtn').onclick = () => {
            if(currentGame.hints>0) { currentGame.hints--; document.getElementById('hintsLeft').innerText=currentGame.hints; alert(`Подсказка: ${char} → ${correct}`); }
            else alert("Нет подсказок");
        };
        modalDiv.querySelector('#modalCancelBtn').onclick = closeModal;
        input.addEventListener('keypress', e=>{ if(e.key==='Enter') submit(); });
    }
    function closeModal() { if(currentModal) { currentModal.remove(); currentModal=null; } }
    function startTimer() { if(currentGame.timerInterval) clearInterval(currentGame.timerInterval); currentGame.startTime=Date.now(); currentGame.timerInterval=setInterval(()=>{ if(currentGame?.isActive && !isPaused) document.getElementById('timerDisplay').innerText=((Date.now()-currentGame.startTime)/1000).toFixed(1); },100); }
    function stopTimer() { if(currentGame?.timerInterval) clearInterval(currentGame.timerInterval); }
    function levelComplete() {
        stopTimer(); let elapsed = (Date.now()-currentGame.startTime)/1000;
        if(currentUser && !currentUser.isGuest) {
            let prog = currentUser.progress[currentGame.difficulty];
            let lvl = currentGame.levelIndex+1;
            if(!prog.completed.includes(lvl)) { prog.completed.push(lvl); prog.bestTimes[lvl]=elapsed; if(lvl===prog.lastUnlocked && lvl<100) prog.lastUnlocked++; }
            else if(prog.bestTimes[lvl] > elapsed) prog.bestTimes[lvl]=elapsed;
            saveUsers(); saveCurrentUser();
        }
        currentGame.isActive=false;
        let div = document.createElement('div'); div.className='choice-dialog';
        div.innerHTML=`<div class="choice-card"><h2>🎉 Уровень пройден!</h2><p>Время: ${elapsed.toFixed(1)} сек</p><div><button class="btn" id="nextLvlBtn">➡️ Следующий</button><button class="btn btn-warning" id="menuBtn">🏠 Меню</button></div></div>`;
        document.body.appendChild(div);
        div.querySelector('#nextLvlBtn').onclick = ()=>{ div.remove(); let nxt = getNextUnlockedLevel(currentGame.difficulty); if(nxt) startLevel(currentGame.difficulty, nxt-1, currentTileMode); else alert("Все уровни пройдены!"); };
        div.querySelector('#menuBtn').onclick = ()=>{ div.remove(); switchTab('menu'); };
    }
    function gameOver() { stopTimer(); alert("💀 Жизни кончились. Перезапуск."); startLevel(currentGame.difficulty, currentGame.levelIndex, currentTileMode); }
    function startLevel(diff, idx, mode) {
        if(currentGame?.timerInterval) stopTimer();
        currentTileMode=mode;
        let data = levelPools[diff].subLevels[idx];
        let tiles = data.tiles.map(t=>({ ...t, removed:false }));
        tiles = shuffleArray(tiles);
        currentGame = { difficulty:diff, levelIndex:idx, currentTiles:tiles, tilesRemaining:tiles.length, lives:5, hints:3, isActive:true };
        document.getElementById('sentenceText').innerText = data.text;
        document.getElementById('livesCount').innerText = 5;
        document.getElementById('hintsLeft').innerText = 3;
        renderTiles(tiles);
        startTimer();
        isPaused=false;
        document.getElementById('pauseModal').classList.add('hidden');
    }
    function getNextUnlockedLevel(diff) { if(!currentUser) return 1; let prog=currentUser.progress[diff]; for(let i=1;i<=100;i++) if(!prog.completed.includes(i) && i<=prog.lastUnlocked) return i; return null; }
    
    // ----- UI (без изменений) -----
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
        document.getElementById(`tab-${tabId}`).classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
        if(tabId==='menu') renderLevelMenu();
        if(tabId==='progress') renderProgress();
    }
    function renderLevelMenu() {
        let container = document.getElementById('levelSelector');
        container.innerHTML = `<div class="level-card" data-diff="easy">🌱 HSK 1</div><div class="level-card" data-diff="medium">🌿 HSK 2</div><div class="level-card" data-diff="hard">🍃 HSK 3</div>`;
        document.querySelectorAll('.level-card').forEach(c=>c.addEventListener('click',()=>showLevelDetail(c.dataset.diff)));
    }
    function showLevelDetail(diff) {
        let panel = document.getElementById('levelDetailPanel');
        if(!currentUser) { alert("Войдите или гость"); return; }
        let prog = currentUser.progress[diff];
        panel.innerHTML = `<h3 style="color:#e2e8f0;">${levelPools[diff].name}</h3>
            <div class="mode-selector"><label><input type="radio" name="startMode" value="flat" checked> 🃏 Обычный</label><label><input type="radio" name="startMode" value="stack"> 🀄️ Маджонг</label></div>
            <button class="btn" id="startNextBtn">▶ Следующий доступный</button><div id="gamesList"></div>`;
        panel.classList.remove('hidden');
        document.getElementById('startNextBtn').onclick = () => {
            let mode = document.querySelector('input[name="startMode"]:checked').value;
            let nxt = getNextUnlockedLevel(diff);
            if(nxt) { switchTab('game'); startLevel(diff, nxt-1, mode); }
            else alert("Все пройдены");
        };
        let listDiv = document.getElementById('gamesList');
        listDiv.innerHTML = "";
        for(let i=1;i<=100;i++) {
            let completed = prog.completed.includes(i);
            let best = prog.bestTimes[i]?prog.bestTimes[i].toFixed(1):"—";
            let unlocked = i<=prog.lastUnlocked;
            listDiv.innerHTML += `<div class="game-list-item"><span>Уровень ${i} ${completed?'✅':''} ${unlocked?'🔓':'🔒'}</span><span>🏆 ${best} сек</span>${unlocked?`<button class="btn-small play-lvl" data-lvl="${i}">Играть</button>`:''}</div>`;
        }
        document.querySelectorAll('.play-lvl').forEach(btn=>btn.addEventListener('click',e=>{
            let lvl = parseInt(btn.dataset.lvl);
            let mode = document.querySelector('input[name="startMode"]:checked').value;
            switchTab('game'); startLevel(diff, lvl-1, mode);
        }));
    }
    function renderProgress() {
        if(!currentUser) { document.getElementById('progressList').innerHTML="<p style='color:#e2e8f0;'>Войдите в аккаунт</p>"; return; }
        let html = "";
        for(let d of ['easy','medium','hard']) {
            let p = currentUser.progress[d];
            html += `<div style="background:#1e293b; border-radius:32px; padding:16px; margin-bottom:16px;"><h3 style="color:#e2e8f0;">${levelPools[d].name}</h3><p style="color:#cbd5e1;">Пройдено: ${p.completed.length}/100</p><ul style="color:#94a3b8;">${p.completed.slice(0,20).map(i=>`<li>Уровень ${i} — ${p.bestTimes[i]?.toFixed(1)} сек</li>`).join('')}${p.completed.length>20?'<li>...</li>':''}</ul></div>`;
        }
        document.getElementById('progressList').innerHTML = html;
    }
    function pauseGame() { if(!currentGame?.isActive) return; isPaused=true; stopTimer(); document.getElementById('pauseModal').classList.remove('hidden'); }
    function resumeGame() { isPaused=false; if(currentGame?.isActive) startTimer(); document.getElementById('pauseModal').classList.add('hidden'); }
    function quitToMenu() { if(currentGame?.timerInterval) stopTimer(); currentGame=null; isPaused=false; document.getElementById('pauseModal').classList.add('hidden'); switchTab('menu'); }
    
    // обработчики
    document.getElementById('registerBtn').onclick = () => {
        let login = document.getElementById('loginInput').value.trim();
        let pass = document.getElementById('passInput').value;
        if(!login || pass.length<3) { document.getElementById('authMsg').innerText="Логин и пароль (мин 3)"; return; }
        if(users.find(u=>u.login===login)) { document.getElementById('authMsg').innerText="Логин занят"; return; }
        let newUser = createUser(login,pass,false);
        users.push(newUser); saveUsers(); currentUser=newUser; saveCurrentUser(); switchTab('menu');
    };
    document.getElementById('loginBtn').onclick = () => {
        let login = document.getElementById('loginInput').value.trim();
        let pass = document.getElementById('passInput').value;
        let user = users.find(u=>u.login===login && u.password===pass);
        if(user) { currentUser=user; currentUser.isGuest=false; saveCurrentUser(); switchTab('menu'); }
        else document.getElementById('authMsg').innerText="Неверный логин/пароль";
    };
    document.getElementById('guestBtn').onclick = () => {
        currentUser = createUser("guest_"+Date.now(),"",true);
        currentUser.isGuest=true; saveCurrentUser(); switchTab('menu');
    };
    document.getElementById('shuffleBtn').onclick = () => {
        if(currentGame?.isActive) {
            let visible = currentGame.currentTiles.filter(t=>!t.removed);
            let removed = currentGame.currentTiles.filter(t=>t.removed);
            currentGame.currentTiles = shuffleArray([...visible, ...removed]);
            renderTiles(currentGame.currentTiles);
        }
    };
    document.getElementById('pauseBtn').onclick = pauseGame;
    document.getElementById('resumeBtn').onclick = resumeGame;
    document.getElementById('quitGameBtn').onclick = quitToMenu;
    
    loadUsers(); loadCurrentUser(); renderLevelMenu();
    document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));
</script>
</body>
</html>
